dataset_root: /directory/to/gtsrb
output_root: ./generated
split: test
seed: 7
limit:
output_extension: .png

physical_transform:
  enabled: true
  rotation_degrees: [-5.0, 5.0]
  brightness: [0.90, 1.10]
  contrast: [0.90, 1.10]
  gaussian_blur_radius: [0.0, 1.25]

attacks:
  shadow:
    enabled: true
    variants_per_image: 2
    coefficient_range: [0.35, 0.55]
    coverage_ratio: [0.15, 0.55]
    edge_blur_radius: [1.5, 3.0]
    max_sampling_attempts: 24

  occlusion:
    enabled: true
    variants_per_image: 3
    styles:
      - edge_patch
      - center_sticker
      - diagonal_band
    opacity_range: [0.80, 1.00]
    edge_band_width_ratio: [0.03, 0.06]
    center_area_ratio: [0.08, 0.18]
    diagonal_band_width_ratio: [0.10, 0.18]
    palette:
      - "#1A1A1A"
      - "#2F2F2F"
      - "#5D4037"
      - "#6B7280"
      - "#8C7A5B"
